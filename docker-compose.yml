services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: simi_postgres
    restart: always
    environment:
      POSTGRES_DB: simi_erp
      POSTGRES_USER: simi_user
      POSTGRES_PASSWORD: simi_password
    volumes:
      - simi_postgres_data:/var/lib/postgresql/data
    networks:
      simi-net:
        ipv4_address: 172.25.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simi_user -d simi_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simi_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      DB_HOST: database
      DB_USER: simi_user
      DB_PASSWORD: simi_password
      DB_NAME: simi_erp
      DB_PORT: 5432
    depends_on:
      database:
        condition: service_healthy
    networks:
      simi-net:
        ipv4_address: 172.25.0.20

volumes:
  simi_postgres_data:

networks:
  simi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24